services:
  - type: web
    name: amkg-api
    runtime: python
    rootDir: .
    buildCommand: pip install .
    startCommand: uvicorn amkg.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.5
